      title: "The HADES Spy Plane Was Circling 35 Minutes Before"
      content:
        graphic: "Flight tracking map showing N1098L circling pattern over Utah"
        data_points:
          - label: "Aircraft"
            value: "N1098L — operated by LASAI Aviation, supports U.S. Army reconnaissance"
          - label: "Type"
            value: "HADES surveillance platform — one of the most advanced spy planes in the U.S. military"
          - label: "Activity"
            value: "Circling UVU area approximately 35 minutes before assassination"
          - label: "Operator"
            value: "LASAI Aviation fleet supports classified Army reconnaissance missions"
        footer: "Why was a U.S. Army spy plane circling the assassination site right before it happened?"
      speaker_notes: >
        A HADES spy plane — registration N1098L — was circling the area approximately 35
