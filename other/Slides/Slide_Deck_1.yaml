    - slide_number: 16
      type: evidence_reveal
      title: "FBI 302 Reports: Over 20 Witnesses Interviewed — None Public"
      content:
        graphic: "Stack of FBI Form 302 documents, all stamped 'CLASSIFIED' or 'WITHHELD'"
        bullets:
          - "FBI Form 302s document every witness interview"
          - "Over 20 people questioned by the FBI Salt Lake City Field Office"
          - "Topics include: multiple accomplices, Discord chats, bullet trajectories"
          - "None have been released. Not one."
          - "Law 1 demands ALL 302s — from the Salt Lake City Field Office AND any other field office"
          - "Including FBI notes, rough notes, memoranda, and case opening documents"
      speaker_notes: >
        FBI Form 302s are the reports agents file after every witness interview. The FBI
        Salt Lake City Field Office has questioned over 20 people. The topics reportedly
        include possible multiple accomplices, Discord chats, bullet trajectories, and more.
        Not a single 302 has been released. Not one. The defense doesn't have them. The
        public doesn't have them. This law mandates disclosure of all 302s, from every field
        office, plus all agent notes, memoranda, and case opening documentation. The 302s
        alone could crack this case wide open.

    - slide_number: 17
      type: evidence_reveal
      title: "Financial Records: Follow the Money"
      content:
        money_flow_graphic:
          connections:
            - from: "Unknown sources"
              to: "Tyler Robinson — alleged $50,000 in wire transfers through DSA-linked accounts"
            - from: "Unknown sources"
              to: "Lance Twiggs — $20,000+ in transfers"
            - from: "TPUSA donors"
              to: "Foreign intelligence contacts within 3 months of assassination"
            - from: "Kirk's DOGE-style audit"
