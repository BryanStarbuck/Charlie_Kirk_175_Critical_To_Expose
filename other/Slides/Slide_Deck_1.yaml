          - "Also demands: information on any laser targeting, range-finding, or tracking devices"
          - "Also demands: whether any drone was actively tracking Kirk at the time of the shot"
      speaker_notes: >
        Reports indicate internet access was cut in the seconds around the shooting.
        Electronic signal jamming at that level requires military or intelligence-grade
