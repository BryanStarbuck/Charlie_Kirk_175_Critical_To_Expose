slide_deck:
  title: "Law 1: The Charlie Kirk Files Forced Disclosure Act"
  subtitle: "Forcing the DoJ and FBI to Release Everything"
  author: "Bryan Starbuck"
  total_slides: 40
  focus: "Law 1 — DoJ/FBI Forced Disclosure (1_DoJ_FBI/Law_1_DoJ_FBI.md)"
  purpose: "Video presentation introducing Law 1, showing Americans why forcing the FBI and DoJ to release all files would blow the Charlie Kirk investigation wide open"

  slides:
    - slide_number: 1
      type: title_slide
      title: "The Charlie Kirk Files Forced Disclosure Act"
      subtitle: "Law 1: Force the FBI and DoJ to Release Everything"
      content:
        center_graphic: "American flag with scales of justice, FBI seal faded behind"
        tagline: "Modeled after the Epstein Files Transparency Act (Public Law 119-38) — passed the House 427-1"
        bottom_text: "BryanStarbuck@gmail.com | github.com/BryanStarbuck"
      speaker_notes: >
        Welcome. I'm Bryan Starbuck, and today I'm going to walk you through one proposed
        federal law that could crack this case wide open. It's called the Charlie Kirk Files
        Forced Disclosure Act, and it targets the FBI, the Department of Justice, and every
        law enforcement agency in the country. If this law passes, they have 30 days to hand
        over everything. No exceptions. No delays. No executive privilege. I'm going to show
        you exactly what they're sitting on, why it matters, and why this law would change
        everything.

    - slide_number: 2
      type: context
      title: "Charlie Kirk Was Assassinated on September 10, 2025"
      content:
        left_panel:
          image: "Photo of Charlie Kirk at a speaking event"
        right_panel:
          bullets:
            - "Founder of Turning Point USA — largest conservative youth organization in America"
            - "Shot and killed at age 31 while speaking on stage at Utah Valley University, Orem, Utah"
            - "Case: State of Utah v. Tyler Alexander Robinson, Case No. 251403576"
            - "Tyler Robinson charged — but citizen investigators say the evidence points far beyond one person"
      speaker_notes: >
        For anyone unfamiliar: Charlie Kirk was the founder of Turning Point USA, the
        biggest conservative youth organization in America. On September 10, 2025, he was
        shot and killed on stage at Utah Valley University. A man named Tyler Robinson was
        charged. But citizen investigators — hundreds of them — have spent months digging
        into the evidence. What they've found suggests this goes far, far beyond one lone
        gunman. And the government is sitting on the answers.

    - slide_number: 3
      type: problem_statement
      title: "The Problem: The Government Has the Answers and Won't Release Them"
      content:
        three_panels:
          - panel: "FBI"
            icon: "lock"
            text: "Holding witness interviews, ballistics, forensics, cell tower data, surveillance footage — and blocking FOIA requests"
          - panel: "DoJ"
            icon: "lock"
            text: "Controls prosecution strategy, grand jury materials, and federal investigation scope — zero transparency"
          - panel: "State & Local"
            icon: "lock"
            text: "Utah law enforcement told by FBI not to talk to witnesses. Gag orders imposed by Judge Graf"
      speaker_notes: >
        Here's the core problem. The FBI has the witness interviews, the ballistics reports,
        the cell tower data, the forensic analysis — and they won't release any of it. FOIA
        requests have been blocked. The DoJ controls the prosecution and investigation scope
        with zero transparency. And at the state level, a judge imposed a gag order on his
        own motion — no party even asked for it — silencing everyone. The government has the
        puzzle pieces, and they're keeping the box locked.

    - slide_number: 4
      type: precedent
      title: "It Worked for Epstein — It Can Work for Charlie Kirk"
      content:
        comparison_table:
          - column: "Epstein Files Act"
            items:
              - "Public Law 119-38"
              - "House vote: 427-1"
              - "Senate: Unanimous consent"
              - "Forced DOJ to release investigation files"
              - "Sponsored by Rep. Thomas Massie"
          - column: "Charlie Kirk Disclosure Act"
            items:
              - "Same model, stronger teeth"
              - "Criminal penalties: 10 years for withholding"
              - "Automatic budget cuts for non-compliance"
              - "No presidential override"
              - "Private right of action — any citizen can sue"
        footer: "The Epstein Act proved Congress CAN force the government's hand. But it had weaknesses we've fixed."
      speaker_notes: >
        This isn't wishful thinking. Congress already did this. The Epstein Files
        Transparency Act passed the House 427 to 1 and the Senate by unanimous consent.
        It forced the DOJ to release Epstein investigation files. We're using the exact
        same model — but with stronger teeth. The Epstein Act had problems: DOJ released
        only about 12,000 documents out of possibly 6 million pages by the deadline. So
        we've added criminal penalties, automatic budget cuts, and the right for any
        American citizen to sue for compliance. No more toothless mandates.

    - slide_number: 5
      type: shock_reveal
      title: "What the FBI Is Sitting On: 208 Specific Items"
      content:
        center_graphic: "Large number '208' with radiating lines to category labels"
        category_ring:
          - "Intelligence discovery (56 items)"
          - "FBI 302 reports"
          - "Counterintelligence"
          - "Cell phone data"
          - "Airport records"
          - "Egyptian planes"
          - "Israeli cell phones"
          - "Financial records"
          - "Chain of custody"
          - "Surveillance footage"
          - "Ballistics"
          - "Autopsy & medical"
          - "Digital forensics"
          - "And 10 more categories..."
      speaker_notes: >
        This law doesn't just say "release everything" — though it does that too. It
        enumerates 208 specific items that must be disclosed. Two hundred and eight. Organized
        across more than 20 categories. Each one is individually mandated. The government
        can't claim partial compliance. They must address every single one. And what's in
        these 208 items will shock you. Let me walk you through the ones that would blow
        this case wide open.

    - slide_number: 6
      type: evidence_reveal
      title: "The Autopsy: What Are They Hiding?"
      content:
        left_panel:
          header: "What We Know"
          bullets:
            - "No exit wound reported"
            - "Neck wound appears to be a laceration, not a ballistic wound"
            - "Abnormally low blood loss — suggesting the heart stopped almost instantly"
            - "Glass/plastic fragments found on Kirk's clothing, on the ground, and in the SUV"
            - "Kirk's left hand shows cuts consistent with shrapnel (visible in casket photos)"
        right_panel:
          header: "What Law 1 Forces Out"
          bullets:
            - "Full autopsy report and toxicology"
            - "All wound analysis — bullet path, caliber determination"
            - "Whether wound is consistent with a .30-06 round or something else entirely"
            - "Fragment analysis — glass, metal, plastic recovered from body"
            - "Why didn't the bullet exit? The FBI knows."
      speaker_notes: >
        The autopsy. This alone would transform the investigation. Here's what citizen
        investigators have found just from video analysis and photos: there was no exit
        wound. The neck wound looks like a laceration, not a bullet wound. The blood loss
        was abnormally low. Glass and plastic fragments were found on his clothing, on the
        ground where he was carried, and in the SUV that took him to the hospital. His left
        hand has cuts consistent with shrapnel. This doesn't match a .30-06 rifle round
        fired from a rooftop. The autopsy report would tell us exactly what hit Charlie Kirk.
        The FBI has it. This law forces them to release it.

    - slide_number: 7
      type: evidence_reveal
      title: "Surveillance Footage: The FBI Has Hours of Video They Won't Show"
      content:
        graphic: "Grid of security camera icons — UVU campus map with camera locations marked"
        bullets:
          - "UVU campus has extensive security camera coverage"
          - "TPUSA had their own cameras running"
          - "Witnesses recorded on their phones — FBI called them and asked them to DELETE the videos"
          - "Some witnesses report videos were remotely deleted from their phones without permission"
          - "The crime scene was paved over with concrete shortly after — including the roof above"
          - "Law 1 forces disclosure of ALL surveillance footage from ALL sources"
      speaker_notes: >
        The surveillance footage. UVU is a university campus — cameras everywhere. TPUSA
        had their own cameras. Witnesses were recording on their phones. And here's what
        the FBI did: they called witnesses who had videos and asked them to delete the
        footage. Multiple witnesses have reported that videos were remotely deleted from
        their phones without their consent. Think about that. The government agency
        investigating the murder was telling witnesses to destroy evidence. And the crime
        scene itself — including the roof above where Kirk was standing — was paved over
        with concrete shortly after. This law forces every frame of video into the public
        record.

    - slide_number: 8
      type: evidence_reveal
      title: "Cell Tower Dumps: Who Was Really at UVU That Day?"
      content:
        graphic: "Cell tower diagram showing phone connections — with '~12 Israeli phones' highlighted"
        bullets:
          - "Cell tower dumps show EVERY phone that connected to towers serving UVU on September 10"
          - "Approximately 12 Israeli-registered cell phones were detected at the shooting site"
          - "Who were these people? Why were they there? Did they communicate with each other?"
          - "Tower dumps also cover Provo Airport, Tyler Robinson's residence, and surrounding areas"
          - "The FBI has all of this data. Citizens have none of it."
      speaker_notes: >
        Cell tower dumps. The FBI can pull data showing every single phone that connected
        to cell towers serving UVU on September 10th. They already have this data. And
        here's what citizen investigators discovered through other means: approximately
        12 Israeli-registered cell phones were at the shooting site. Twelve. Who are these
        people? Were they coordinating? Did they communicate with each other, with foreign
        intelligence, with anyone at the event? The FBI knows. This law forces them to
        release the tower dumps for UVU, for Provo Airport, for Tyler Robinson's residence,
        for the surrounding area. Every phone. Every connection. Into the public record.

    - slide_number: 9
      type: evidence_reveal
      title: "Egyptian Military Planes Landed at Provo Airport"
      content:
        graphic: "Map showing flight paths from Egypt to Provo Municipal Airport"
        data_points:
          - label: "Aircraft"
            value: "SU-BTT, SU-BND — Egyptian-registered planes"
          - label: "Passengers"
            value: "Personnel with 'U.S. Department of Defense Liaison' badges and Egyptian passports"
          - label: "Timing"
            value: "Arrived in weeks before September 10, 2025"
          - label: "Activity"
            value: "Counter-UAS testing at Provo Airport, September 4-10"
          - label: "Key question"
            value: "Why were Egyptian military contractors at a small Utah airport days before the assassination?"
      speaker_notes: >
        Egyptian military planes. SU-BTT and SU-BND — Egyptian-registered aircraft — landed
        at Provo Municipal Airport. The passengers had U.S. Department of Defense Liaison
        badges and Egyptian passports boarding private planes. There was Counter-UAS testing
        happening at Provo Airport from September 4th through September 10th — the day of
        the killing. Why were Egyptian military contractors at a small Utah airport the week
        Charlie Kirk was shot? The FBI has the CBP arrival records, the airport logs, the
        identities of every person who got off those planes. This law forces all of it out.

