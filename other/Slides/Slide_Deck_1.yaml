        the bank records, the wire transfer data. This law forces disclosure of every
        financial transaction connected to every person in this investigation.

    - slide_number: 18
      type: evidence_reveal
      title: "Ballistics: The Shot Doesn't Match the Rifle"
      content:
        two_columns:
          left:
            header: "Official Story"
            bullets:
              - ".30-06 round from Mauser Model 98"
              - "Fired from rooftop"
              - "One shooter"
          right:
            header: "Evidence Problems"
            bullets:
              - "Witness Eric described shot sound as 'cherry bomb' — not deep rifle report"
              - "No exit wound from a .30-06 — a round that typically passes through a body"
              - "Bullet didn't exit — inconsistent with high-velocity rifle round"
              - "FBI has forensic acoustic analysis they haven't released"
              - "Multiple witnesses suggest shot came from different direction"
      speaker_notes: >
        The ballistics don't add up. A .30-06 round from a Mauser Model 98 is a
        high-velocity rifle cartridge. It typically passes clean through a human body. But
        there was no exit wound. A witness named Eric described the shot as sounding like a
        "cherry bomb" — not the deep report of a rifle. Other witnesses suggested the shot
        came from a different direction. The FBI has forensic acoustic analysis that could
        pinpoint exactly where the shot originated. They have the full ballistics workup.
        They know whether that Mauser was actually fired that day. This law forces all of
        it out — every round, every trajectory, every analysis.

    - slide_number: 19
      type: evidence_reveal
      title: "The Suspect Doesn't Match: Clothing, Build, Backpack"
      content:
        comparison:
          figure_a:
            label: "Tyler Robinson (confirmed sighting)"
            details: "Light blue backpack, half empty. Shorts. Visible after leaving his car."
          figure_b:
            label: "Stairway/Rooftop Figure (FBI footage)"
            details: "Different backpack (full), different clothing. Different build characteristics."
        key_points:
          - "A 22-year-old doesn't switch backpacks and hats between sightings"
          - "Gun couldn't be hidden in shorts or the half-empty backpack"
          - "FBI biometric and facial analysis exists but hasn't been released"
          - "FBI admits possible 'multiple accomplices'"
      speaker_notes: >
        The suspect identification has serious problems. Tyler Robinson was seen leaving his
        car with a light blue backpack, half empty, wearing shorts. The person on the
        stairway in FBI surveillance footage has a different backpack — full — and different
        clothing. The gun is a full-size Mauser rifle. It can't be hidden in shorts or a
        half-empty backpack. The FBI has done biometric analysis and facial comparison.
        They've admitted the possibility of multiple accomplices. But none of this analysis
        is public. This law demands all of it: the comparisons, the biometrics, the facial
        recognition work, and any evidence that the stairway figure is a different person
        from Tyler Robinson.

