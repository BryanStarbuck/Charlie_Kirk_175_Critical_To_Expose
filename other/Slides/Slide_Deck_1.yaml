    - slide_number: 11
      type: evidence_reveal
      title: "The Weapon Was Found Under Suspicious Circumstances"
      content:
        timeline:
          - step: "1"
            text: "Initial search by local law enforcement — arm to arm. No weapon found."
          - step: "2"
            text: "K-9 unit search. No weapon found."
          - step: "3"
            text: "FBI arrives."
          - step: "4"
            text: "Three FBI agents direct three junior local officers to search the area again."
          - step: "5"
            text: "Weapon 'found' — a Mauser Model 98 (.30-06 caliber)"
        footer: "Two professional searches found nothing. The FBI arrives, directs a third search, and the gun appears."
      speaker_notes: >
        The weapon. This is one of the most damning sequences. Local law enforcement did
        an arm-to-arm search of the area. Nothing found. Then K-9 units searched. Still
        nothing. Then the FBI arrived. Three FBI agents instructed three junior local law
        enforcement officers — new hires — to search the area again. And suddenly, the
        weapon was found. A Mauser Model 98, .30-06 caliber. Two professional searches,
        including trained dogs, found nothing. The FBI shows up, and the gun magically
        appears. This law forces disclosure of every detail about who directed that search,
        the chain of custody of that weapon, and whether it was actually the weapon that
        killed Charlie Kirk.

    - slide_number: 12
      type: evidence_reveal
      title: "The FBI Was Already on Scene — In a RAV4"
      content:
        graphic: "Map showing Tyler Robinson's location and FBI RAV4 route"
        bullets:
          - "An FBI vehicle — a silver Toyota RAV4 — drove past Tyler Robinson at or near the time of the shooting"
          - "When pulled over, the occupant flashed an FBI badge"
          - "Why was an FBI vehicle already in the immediate area?"
          - "Was this a surveillance operation? Was Robinson being monitored?"
          - "Law 1 demands: all records of FBI personnel and vehicles deployed at or near UVU on September 10"
      speaker_notes: >
        Here's something most people don't know. An FBI vehicle — a silver Toyota RAV4 —
        drove right past Tyler Robinson at or near the time of the shooting. When the
        vehicle was pulled over, the driver flashed an FBI badge. Why was the FBI already
        there? Were they running surveillance? Were they monitoring Robinson? If so, did they
        know what was about to happen? This law specifically demands all records of FBI
        personnel and vehicles deployed at or near UVU on September 10th. The public
        deserves to know why the FBI was on scene before anyone called them.

    - slide_number: 13
      type: evidence_reveal
      title: "The Exploding Microphone Theory"
      content:
        evidence_chain:
          - item: "DoD Contract N0016425PJ538"
            detail: "May 2025: 'MINIATURIZED-XS DEMOLITION CHARGES, ANTI PERSONNEL-XS' — only contract of its kind since 2008"
          - item: "Recipient: Accurate Energetic Systems (AES)"
            detail: "McEwen, Tennessee — shaped charge experts, claymore mines, PETN explosive pressing"
          - item: "Private Flight: Heber City, UT to Nashville, TN"
            detail: "August 25, 2025 — Nashville is nearest airport to AES facility. No return flight logged."
          - item: "Video Evidence"
            detail: "Shirt fabric billows outward — pressure wave pushing AWAY from body. Blood appears AFTER the blast."
          - item: "AES Factory Destroyed"
            detail: "October 10, 2025 — factory explodes, 16 killed. All on-site evidence destroyed."
      speaker_notes: >
        The exploding microphone theory. In May 2025, the Department of Defense awarded
        contract N0016425PJ538 for "miniaturized anti-personnel demolition charges" — the
        only contract of its kind in the entire USAspending.gov database going back to 2008.
        The recipient was Accurate Energetic Systems in Tennessee — experts in shaped charges
        and claymore mines. On August 25th, a private flight went from Heber City, Utah to
        Nashville — the nearest airport to the AES facility. No return flight was logged.
        Video analysis of the shooting shows Kirk's shirt fabric billowing outward — a
        pressure wave pushing away from the body. Blood appears after the blast, not during.
        And then on October 10th — right after a researcher publicly discussed this theory
        online — the AES factory exploded. Sixteen people killed. All evidence destroyed.
        The FBI has investigated this. This law forces them to release what they found.

    - slide_number: 14
      type: evidence_reveal
      title: "The Crime Scene Was Paved Over"
      content:
        before_after:
          before: "Grass area where Kirk was shot — potential explosive residue, glass fragments, blood evidence"
          after: "Concrete. The entire area paved over shortly after the killing."
        additional:
          - "The roof above the tent was also redone"
          - "Glass fragments and explosive traces were reported on the grass before paving"
          - "The FBI chose not to take the hospital transport vehicle into evidence — fragments were in it"
          - "This is evidence destruction in plain sight"
      speaker_notes: >
        The crime scene was paved over with concrete. Not months later. Shortly after the
        killing. The grass where Kirk fell — where glass fragments and potential explosive
        residue were found — covered in concrete. And not just the ground: the roof above
        the tent where Kirk was standing was also redone. Glass fragments were in the SUV
        that transported Kirk to the hospital, and the FBI chose not to take that vehicle
        into evidence. Think about any murder case you've ever heard of. Now imagine the
        crime scene being paved over and the transport vehicle being ignored. This law demands
        full accounting of who authorized the paving, when, and what evidence was present
        before it was destroyed.

